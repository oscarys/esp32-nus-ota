name: esp32_nus_ota
description: BLE OTA update client for ESP32 MicroPython via NUS.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  file_picker: ^8.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0   # device history persistence
  google_fonts: ^6.2.1         # RobotoMono
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
